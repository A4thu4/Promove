name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promove
          POSTGRES_PASSWORD: promove_test
          POSTGRES_DB: promove_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U promove"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: sqlite:///test.db
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests (SQLite)
        run: python -m pytest tests/ -q --tb=short

      - name: Run tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql://promove:promove_test@localhost:5432/promove_test
        run: python -m pytest tests/ -q --tb=short

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff check backend/ --select=E,W,F --ignore=E501

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t promove-backend .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t promove-frontend --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 .
