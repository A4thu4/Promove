name: 🤖 Projects — Auto Move Cards

on:
  issues:
    types: [opened, reopened, assigned, closed, labeled]
  pull_request:
    types: [opened, closed, ready_for_review, converted_to_draft]

jobs:
  # ─────────────────────────────────────────────────
  # Move issue to Backlog when opened/reopened
  # ─────────────────────────────────────────────────
  move-to-backlog:
    name: Move to Backlog
    runs-on: ubuntu-latest
    permissions:
      issues: read
    if: >
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - name: Add issue to project and set Backlog
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/ArthemizLabs/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

  # ─────────────────────────────────────────────────
  # Move issue to Ready to Dev when label is added
  # ─────────────────────────────────────────────────
  move-to-ready:
    name: Move to Ready to Dev
    runs-on: ubuntu-latest
    permissions:
      issues: read
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'ready-to-dev'
    steps:
      - name: Move issue to Ready to Dev
        uses: titoportas/update-project-fields@v0.1.0
        with:
          project-url: https://github.com/orgs/ArthemizLabs/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
          field-keys: Status
          field-values: "✅ Ready to Dev"

  # ─────────────────────────────────────────────────
  # Move issue to In Progress when assigned
  # ─────────────────────────────────────────────────
  move-to-in-progress:
    name: Move to In Progress
    runs-on: ubuntu-latest
    permissions:
      issues: read
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'assigned'
    steps:
      - name: Move issue to In Progress
        uses: titoportas/update-project-fields@v0.1.0
        with:
          project-url: https://github.com/orgs/ArthemizLabs/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
          field-keys: Status
          field-values: "🔧 In Progress"

  # ─────────────────────────────────────────────────
  # Move issue to In Review when PR is opened
  # ─────────────────────────────────────────────────
  move-to-review:
    name: Move linked issue to In Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.draft == false
    steps:
      - name: Extract linked issue number
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (match) {
              core.setOutput('issue_number', match[1]);
            }

      - name: Move issue to In Review
        if: steps.extract.outputs.issue_number != ''
        uses: titoportas/update-project-fields@v0.1.0
        with:
          project-url: https://github.com/orgs/ArthemizLabs/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
          field-keys: Status
          field-values: "🔍 In Review"

  # ─────────────────────────────────────────────────
  # Move issue to Done when PR is merged
  # ─────────────────────────────────────────────────
  move-to-done:
    name: Move to Done on PR merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Move issue to Done
        uses: titoportas/update-project-fields@v0.1.0
        with:
          project-url: https://github.com/orgs/ArthemizLabs/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
          field-keys: Status
          field-values: "🚀 Done"

      - name: Comment on linked issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/(?:closes|fixes|resolves)\s+#(\d+)/i);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(match[1]),
                body: `🚀 **Done!** PR #${context.payload.pull_request.number} foi merged.\n\n✅ Esta task contribui para os **Pilares de Imigração 2030** — verifique se foi marcada com o pilar correto no projeto.`
              });
            }
