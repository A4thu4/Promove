version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=PROMOVE API
      - DEBUG=True
      - API_V1_STR=/api/v1
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ALGORITHM=HS256
      - BACKEND_CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - ./backend/sql_app.db:/app/sql_app.db
    networks:
      - promove-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - promove-network

networks:
  promove-network:
    driver: bridge
